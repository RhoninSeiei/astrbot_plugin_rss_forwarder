<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">RSS/Twitter 源配置面板示意</title>
  <desc id="desc">使用占位数据展示 AstrBot RSS Forwarder 插件面板中的 RSS 源和 Twitter/Nitter 源配置。</desc>
  <defs>
    <style>
      .bg { fill: #f4f6fb; }
      .panel { fill: #ffffff; stroke: #d8deea; stroke-width: 1; }
      .sidebar { fill: #182132; }
      .sidebar-text { fill: #cbd5e1; font: 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .sidebar-active { fill: #2b5cff; }
      .h1 { fill: #111827; font: 700 28px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .h2 { fill: #1f2937; font: 700 20px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .label { fill: #475569; font: 14px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .value { fill: #111827; font: 15px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .hint { fill: #64748b; font: 13px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .tab { fill: #eef3ff; stroke: #c7d2fe; stroke-width: 1; }
      .input { fill: #f8fafc; stroke: #d8deea; stroke-width: 1; }
      .chip { fill: #e8f2ff; stroke: #bfdbfe; stroke-width: 1; }
      .chip-text { fill: #1d4ed8; font: 13px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .toggle-on { fill: #2b5cff; }
      .toggle-knob { fill: #ffffff; }
      .callout { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; }
      .callout-text { fill: #9a3412; font: 14px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="sidebar" width="240" height="760"/>
  <text x="28" y="48" fill="#ffffff" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">AstrBot</text>
  <rect class="sidebar-active" x="20" y="112" width="200" height="44" rx="10"/>
  <text class="sidebar-text" x="36" y="140" fill="#ffffff">插件管理</text>
  <text class="sidebar-text" x="36" y="200">模型服务</text>
  <text class="sidebar-text" x="36" y="248">消息平台</text>
  <text class="sidebar-text" x="36" y="296">系统设置</text>

  <rect class="panel" x="272" y="32" width="952" height="696" rx="16"/>
  <text class="h1" x="304" y="78">AstrBot RSS Forwarder</text>
  <text class="hint" x="304" y="106">插件配置示意图，所有内容均为占位数据</text>
  <rect class="tab" x="304" y="130" width="196" height="36" rx="18"/>
  <text class="chip-text" x="326" y="153">RSS/Twitter 源配置</text>
  <text class="label" x="520" y="153">推送目标配置</text>
  <text class="label" x="650" y="153">任务配置</text>

  <rect class="panel" x="304" y="192" width="418" height="436" rx="12"/>
  <text class="h2" x="328" y="230">RSS/Atom 源</text>
  <rect class="chip" x="552" y="205" width="126" height="28" rx="14"/>
  <text class="chip-text" x="570" y="224">rss_feed</text>
  <text class="label" x="328" y="270">Feed 唯一 ID</text>
  <rect class="input" x="328" y="284" width="346" height="38" rx="8"/>
  <text class="value" x="344" y="308">vendor_blog_rss</text>
  <text class="label" x="328" y="350">RSS/Atom 源地址</text>
  <rect class="input" x="328" y="364" width="346" height="38" rx="8"/>
  <text class="value" x="344" y="388">https://example.com/feed.xml</text>
  <text class="label" x="328" y="430">鉴权模式</text>
  <rect class="input" x="328" y="444" width="160" height="38" rx="8"/>
  <text class="value" x="344" y="468">none</text>
  <text class="label" x="514" y="430">抓取超时</text>
  <rect class="input" x="514" y="444" width="160" height="38" rx="8"/>
  <text class="value" x="530" y="468">10 秒</text>
  <text class="label" x="328" y="522">是否启用该源</text>
  <rect class="toggle-on" x="328" y="538" width="58" height="30" rx="15"/>
  <circle class="toggle-knob" cx="370" cy="553" r="12"/>
  <text class="hint" x="404" y="558">补全 ID 与地址后再启用</text>

  <rect class="panel" x="754" y="192" width="418" height="436" rx="12"/>
  <text class="h2" x="778" y="230">Twitter/Nitter 源</text>
  <rect class="chip" x="1010" y="205" width="126" height="28" rx="14"/>
  <text class="chip-text" x="1028" y="224">twitter_feed</text>
  <text class="label" x="778" y="270">Feed 唯一 ID</text>
  <rect class="input" x="778" y="284" width="346" height="38" rx="8"/>
  <text class="value" x="794" y="308">vendor_status_twitter</text>
  <text class="label" x="778" y="350">Twitter 推主用户名</text>
  <rect class="input" x="778" y="364" width="346" height="38" rx="8"/>
  <text class="value" x="794" y="388">example_account</text>
  <text class="label" x="778" y="430">Nitter 镜像站地址</text>
  <rect class="input" x="778" y="444" width="346" height="38" rx="8"/>
  <text class="value" x="794" y="468">https://nitter.example.com</text>
  <rect class="chip" x="778" y="512" width="98" height="28" rx="14"/>
  <text class="chip-text" x="796" y="531">发送图片</text>
  <rect class="chip" x="890" y="512" width="98" height="28" rx="14"/>
  <text class="chip-text" x="908" y="531">发送视频</text>
  <rect class="chip" x="1002" y="512" width="98" height="28" rx="14"/>
  <text class="chip-text" x="1020" y="531">附带链接</text>
  <text class="label" x="778" y="582">每轮最多新推文</text>
  <rect class="input" x="904" y="560" width="90" height="36" rx="8"/>
  <text class="value" x="938" y="584">1</text>
  <rect class="toggle-on" x="1030" y="560" width="58" height="30" rx="15"/>
  <circle class="toggle-knob" cx="1072" cy="575" r="12"/>

  <rect class="callout" x="304" y="652" width="868" height="44" rx="10"/>
  <text class="callout-text" x="328" y="680">示例值仅用于说明配置位置；实际 RSS 地址、推主账号和镜像站需要按部署环境填写。</text>
</svg>
